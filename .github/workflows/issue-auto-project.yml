name: Auto-assign issues to projects

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: read

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Add to project based on labels
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: |
          add_to_project() {
            local project_id="$1"
            gh api graphql -f query="
              mutation {
                addProjectV2ItemById(input: {projectId: \"$project_id\", contentId: \"$ISSUE_NODE_ID\"}) {
                  item { id }
                }
              }" --silent
          }

          if echo "$LABELS" | grep -qw "feature"; then
            echo "Adding to Heartbeat Features..."
            add_to_project "PVT_kwDOBKCETs4BPU4-"
          fi
          if echo "$LABELS" | grep -qwE "ci|dx|security"; then
            echo "Adding to Heartbeat CI/CD..."
            add_to_project "PVT_kwDOBKCETs4BPBj5"
          fi
          if echo "$LABELS" | grep -qw "bug"; then
            echo "Adding to Heartbeat Bugs and Feedback..."
            add_to_project "PVT_kwDOBKCETs4BQC7V"
          fi
